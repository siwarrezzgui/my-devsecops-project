name: BC DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HARBOR_REGISTRY: 172.16.8.169:80
  HARBOR_PROJECT: bc
  IMAGE_NAME: bc-browser
  FULL_IMAGE_NAME: 172.16.8.169:80/bc/bc-browser

jobs:
  build-scan-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify files
        run: |
          test -f docker/Dockerfile
          test -f ansible/inventory.ini
          test -f sonar-project.properties
          echo "Files OK"

      - name: Install Gitleaks
        run: |
          wget -qO /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version

      - name: Scan secrets with Gitleaks
        run: |
          /tmp/gitleaks detect --no-git --source . --redact --verbose --exit-code 1

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Build image
        run: |
          docker build -t $FULL_IMAGE_NAME:${{ github.sha }} ./docker
          docker tag $FULL_IMAGE_NAME:${{ github.sha }} $FULL_IMAGE_NAME:latest
          docker images | grep bc-browser

      - name: Export image to tar
        run: |
          docker save -o /tmp/bc-browser.tar $FULL_IMAGE_NAME:${{ github.sha }}

      - name: Scan exported image with Trivy
        run: |
          trivy image \
            --input /tmp/bc-browser.tar \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $HARBOR_REGISTRY -u "${{ secrets.HARBOR_USER }}" --password-stdin

      - name: Prepare Ansible secrets
        run: |
          mkdir -p ansible/secrets
          cat > ansible/secrets/secrets.yml <<EOF
          harbor_user: "${{ secrets.HARBOR_USER }}"
          harbor_password: "${{ secrets.HARBOR_PASSWORD }}"
          EOF

      - name: Push image
        run: |
          docker push $FULL_IMAGE_NAME:${{ github.sha }}
          docker push $FULL_IMAGE_NAME:latest

      - name: Deploy with Ansible
        run: |
          cd ansible
          ansible-playbook playbooks/deploy-container.yml

      - name: Verify deployment
        run: |
          cd ansible
          ansible-playbook playbooks/verify-deployment.yml

      - name: Health Check
        run: |
          echo "Checking container health..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://172.16.8.162:3000 || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "401" ]; then
              echo "Health check passed with HTTP status: $STATUS"
              exit 0
            fi
            echo "Health check retry $i/6 ..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Availability Test
        run: |
          echo "Testing application availability..."
          for i in {1..5}; do
            if curl -f http://172.16.8.162:3000; then
              echo "Application is UP"
              exit 0
            else
              echo "Availability retry $i/5 ..."
              sleep 5
            fi
          done
          echo "Application is DOWN"
          exit 1

      - name: Rollback if failed
        if: failure()
        run: |
          echo "Deployment failed. Starting rollback..."
          cd ansible
          ansible-playbook playbooks/deploy-container.yml -e "harbor_tag=previous"