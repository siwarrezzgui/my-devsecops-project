name: BC DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HARBOR_REGISTRY: 172.16.8.169:80
  HARBOR_PROJECT: bc
  IMAGE_NAME: bc-browser

jobs:
  build-scan-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project files
        run: |
          test -f docker/Dockerfile
          test -f docker/startup.sh
          test -f ansible/inventory.ini
          test -f ansible/playbooks/deploy-container.yml
          test -f ansible/playbooks/verify-deployment.yml

      - name: Build Docker image
        run: |
          docker build -t $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:${{ github.sha }} ./docker
          docker tag $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:${{ github.sha }} $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest

      - name: Scan image with Trivy
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:${{ github.sha }}

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $HARBOR_REGISTRY -u "${{ secrets.HARBOR_USER }}" --password-stdin

      - name: Push image to Harbor
        run: |
          docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:${{ github.sha }}
          docker push $HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest

      - name: Create Ansible secrets file
        run: |
          mkdir -p ansible/secrets
          cat > ansible/secrets/secrets.yml <<EOF
          harbor_user: "${{ secrets.HARBOR_USER }}"
          harbor_password: "${{ secrets.HARBOR_PASSWORD }}"
          EOF

      - name: Test Ansible connectivity
        run: |
          cd ansible
          ansible windows -m ansible.windows.win_ping

      - name: Deploy container with Ansible
        run: |
          cd ansible
          ansible-playbook playbooks/deploy-container.yml

      - name: Verify deployment
        run: |
          cd ansible
          ansible-playbook playbooks/verify-deployment.yml
