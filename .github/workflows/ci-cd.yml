name: BC DevOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HARBOR_REGISTRY: 172.16.8.169:80
  HARBOR_PROJECT: bc
  IMAGE_NAME: bc-browser
  FULL_IMAGE_NAME: 172.16.8.169:80/bc/bc-browser

jobs:
  build-scan-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify files
        run: |
          test -f docker/Dockerfile
          test -f ansible/inventory.ini
          test -f sonar-project.properties
          echo "Files OK"

      - name: Install Gitleaks
        run: |
         
          wget -qO gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x ./gitleaks
          ./gitleaks version

      - name: Scan secrets with Gitleaks
        run: |
          ./gitleaks detect --source . --redact --verbose --exit-code 1

      

      

      - name: Test Sonar token with API
        run: |
          curl -H "Authorization: Bearer ${SONAR_TOKEN}" \
          "${SONAR_HOST_URL}/api/system/status"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Build image
        run: |
          docker build -t $FULL_IMAGE_NAME:${{ github.sha }} ./docker
          docker tag $FULL_IMAGE_NAME:${{ github.sha }} $FULL_IMAGE_NAME:latest
          docker images | grep bc-browser

      - name: Export image to tar
        run: |
          docker save -o /tmp/bc-browser.tar $FULL_IMAGE_NAME:${{ github.sha }}

      - name: Scan exported image with Trivy
        run: |
          trivy image \
            --input /tmp/bc-browser.tar \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1

      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login $HARBOR_REGISTRY -u "${{ secrets.HARBOR_USER }}" --password-stdin

      - name: Prepare Ansible secrets
        run: |
          mkdir -p ansible/secrets
          cat > ansible/secrets/secrets.yml <<EOF
          harbor_user: "${{ secrets.HARBOR_USER }}"
          harbor_password: "${{ secrets.HARBOR_PASSWORD }}"
          EOF

      - name: Push image
        run: |
          docker push $FULL_IMAGE_NAME:${{ github.sha }}
          docker push $FULL_IMAGE_NAME:latest

      - name: Deploy with Ansible
        run: |
          cd ansible
          ansible-playbook playbooks/deploy-container.yml

      - name: Verify deployment
        run: |
          cd ansible
          ansible-playbook playbooks/verify-deployment.yml