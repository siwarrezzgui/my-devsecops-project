---
- name: Déployer le conteneur Business Central depuis Harbor
  hosts: windows
  gather_facts: no
  vars_files:
    - ../secrets/secrets.yml

  tasks:
    - name: Login à Harbor
      ansible.windows.win_shell: |
        $env:DOCKER_HOST = "npipe:////./pipe/dockerDesktopLinuxEngine"
        $password = "{{ harbor_password }}"
        $password | docker login {{ harbor_registry }} -u "{{ harbor_user }}" --password-stdin
      no_log: true
      register: login_result

    - name: Afficher resultat login
      debug:
        var: login_result.stdout

    - name: Pull image depuis Harbor
      ansible.windows.win_shell: |
        $env:DOCKER_HOST = "npipe:////./pipe/dockerDesktopLinuxEngine"
        docker pull {{ harbor_registry }}/{{ harbor_project }}/{{ harbor_image }}:{{ harbor_tag }}

    - name: Supprimer ancien conteneur s'il existe
      ansible.windows.win_shell: |
        $env:DOCKER_HOST = "npipe:////./pipe/dockerDesktopLinuxEngine"
        docker rm -f bc-test 2>$null
      failed_when: false

    - name: Lancer nouveau conteneur
      ansible.windows.win_shell: |
        $env:DOCKER_HOST = "npipe:////./pipe/dockerDesktopLinuxEngine"
        docker run -d --name bc-test -p 3000:3000 --shm-size=1gb `
          {{ harbor_registry }}/{{ harbor_project }}/{{ harbor_image }}:{{ harbor_tag }}
      register: run_result

    - name: Afficher resultat lancement
      debug:
        var: run_result.stdout

    - name: Vérifier conteneur
      ansible.windows.win_shell: |
        $env:DOCKER_HOST = "npipe:////./pipe/dockerDesktopLinuxEngine"
        docker ps
      register: result

    - name: Afficher conteneurs
      debug:
        var: result.stdout
    - name: Ouvrir le port 3000 dans le firewall Windows
      ansible.windows.win_shell: |
        $rule = Get-NetFirewallRule -DisplayName "Allow port 3000 BC App" -ErrorAction SilentlyContinue
        if (-not $rule) {
          New-NetFirewallRule `
            -DisplayName "Allow port 3000 BC App" `
            -Direction Inbound `
            -Protocol TCP `
            -LocalPort 3000 `
            -Action Allow
          Write-Output "Regle firewall creee"
        } else {
          Write-Output "Regle firewall existe deja"
        }
      environment:
        DOCKER_HOST: "npipe:////./pipe/dockerDesktopLinuxEngine"