---
- name: Déployer le conteneur Business Central depuis Harbor
  hosts: windows
  gather_facts: no
  vars_files:
    - ../secrets/secrets.yml

  tasks:
    - name: Login à Harbor
      ansible.windows.win_shell: >
        docker login {{ harbor_registry }}
        -u {{ harbor_user }}
        -p {{ harbor_password }}

    - name: Pull image depuis Harbor
      ansible.windows.win_command: >
        docker pull {{ harbor_registry }}/{{ harbor_project }}/{{ harbor_image }}:{{ harbor_tag }}

    - name: Supprimer ancien conteneur s'il existe
      ansible.windows.win_shell: |
        docker rm -f bc-test 2>$null
      ignore_errors: yes

    - name: Lancer nouveau conteneur
      ansible.windows.win_command: >
        docker run -d
        --name bc-test
        -p 3000:3000
        --shm-size=1gb
        {{ harbor_registry }}/{{ harbor_project }}/{{ harbor_image }}:{{ harbor_tag }}

    - name: Vérifier conteneur
      ansible.windows.win_command: docker ps
      register: result

    - name: Afficher conteneurs
      debug:
        var: result.stdout