---
- name: Test Harbor avec Docker Desktop Linux Engine
  hosts: windows
  gather_facts: no
  vars_files:
    - ../secrets/secrets.yml

  tasks:
    - name: Afficher utilisateur courant
      ansible.windows.win_shell: whoami
      register: whoami_result

    - debug:
        var: whoami_result.stdout

    - name: Afficher docker version avec Docker Desktop Linux Engine
      ansible.windows.win_shell: |
        $env:DOCKER_HOST="npipe:////./pipe/dockerDesktopLinuxEngine"
        docker version
      register: docker_version_result

    - debug:
        var: docker_version_result.stdout

    - name: Pull image depuis Harbor
      ansible.windows.win_shell: |
        $env:DOCKER_HOST="npipe:////./pipe/dockerDesktopLinuxEngine"
        docker pull {{ harbor_registry }}/{{ harbor_project }}/{{ harbor_image }}:{{ harbor_tag }}
      register: pull_result

    - debug:
        var: pull_result.stdout

    - name: Supprimer ancien conteneur si existe
      ansible.windows.win_shell: |
        $env:DOCKER_HOST="npipe:////./pipe/dockerDesktopLinuxEngine"
        docker rm -f bc-test 2>$null
      ignore_errors: yes

    - name: Lancer conteneur test
      ansible.windows.win_shell: |
        $env:DOCKER_HOST="npipe:////./pipe/dockerDesktopLinuxEngine"
        docker run -d --name bc-test -p 3000:3000 --shm-size=1gb {{ harbor_registry }}/{{ harbor_project }}/{{ harbor_image }}:{{ harbor_tag }}
      register: run_result

    - debug:
        var: run_result.stdout

    - name: Vérifier conteneurs
      ansible.windows.win_shell: |
        $env:DOCKER_HOST="npipe:////./pipe/dockerDesktopLinuxEngine"
        docker ps -a
      register: ps_result

    - debug:
        var: ps_result.stdout